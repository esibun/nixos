#Boorupaper Configuration - Generated Sat Jun 20 03:15:19 PM EDT 2026

# --- Display Server ---
DISPLAY_SERVER="wayland"

# --- Wallpaper Command ---
WALLPAPER_COMMAND="for monitor in \$(hyprctl monitors -j | jq -r '.[].name'); do hyprctl hyprpaper wallpaper \"\${monitor},{IMAGE}\"; done"

# --- Basic Search Parameters ---
LIMIT=50
RATING="s"
ORDER="random"
PAGE=1

# --- Advanced Filters ---
MAX_FILE_SIZE="0"

# --- Resolution ---
MIN_WIDTH="3840"
MIN_HEIGHT="2160"

# --- Content ---
PREFERRED_FORMAT="jpg"
ANIMATED_ONLY=false

# --- Random Tags ---
RANDOM_TAGS_COUNT=0
RANDOM_TAGS_LIST=("landscape" "scenic" "sky" "clouds" "water" "original" "touhou" "building")

# --- Cache & Performance ---
PRELOAD_COUNT=3
MAX_PRELOAD_CACHE=10

# --- Favorites ---
FAVORITES_DIR="/home/esi/Pictures/Wallpapers"

# --- Notifications ---
ENABLE_NOTIFICATIONS=false
NOTIFY_TIMEOUT=5000
NOTIFY_PRELOAD=false

# --- Logging ---
ENABLE_LOGGING=true
LOG_FILE="/home/esi/.config/boorupaper/boorupaper.log"
LOG_LEVEL="detailed"
LOG_ROTATION=true
